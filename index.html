<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>남주고 버스 검색</title>
</head>
<body>

<h1>🚌 남주고 버스 검색</h1>

<input type="text" id="search" placeholder="목적지 입력 (예: 중앙로터리)">
<button onclick="findBus()">검색</button>

<p id="result"></p>

<script>
// 🔥 전체 데이터 (txt 기반 변환)
const busData = [
  // 510
  { bus: "510", stop: "중앙로터리", time: "06:35" },
  { bus: "510", stop: "중앙로터리", time: "07:56" },

  { bus: "510", stop: "서귀포버스터미널", time: "06:54" },
  { bus: "510", stop: "서귀포버스터미널", time: "08:15" },

  { bus: "510", stop: "중문우체국", time: "07:12" },
  { bus: "510", stop: "중문우체국", time: "08:33" },

  // 531
  { bus: "531", stop: "중앙로터리", time: "07:08" },
  { bus: "531", stop: "중앙로터리", time: "07:43" },
  { bus: "531", stop: "중앙로터리", time: "20:56" },

  { bus: "531", stop: "중문우체국", time: "06:30" },
  { bus: "531", stop: "중문우체국", time: "07:05" },
  { bus: "531", stop: "중문우체국", time: "21:36" },

  { bus: "531", stop: "남주고", time: "07:20" },
  { bus: "531", stop: "남주고", time: "07:55" },
  { bus: "531", stop: "남주고", time: "20:37" },

  // 532
  { bus: "532", stop: "중앙로터리", time: "07:56" },
  { bus: "532", stop: "중앙로터리", time: "15:16" },
  { bus: "532", stop: "중앙로터리", time: "18:21" },
  { bus: "532", stop: "중앙로터리", time: "21:11" },

  { bus: "532", stop: "중문우체국", time: "08:34" },
  { bus: "532", stop: "중문우체국", time: "15:54" },
  { bus: "532", stop: "중문우체국", time: "18:59" },
  { bus: "532", stop: "중문우체국", time: "21:49" },

  { bus: "532", stop: "화순", time: "09:00" },
  { bus: "532", stop: "화순", time: "16:20" },
  { bus: "532", stop: "화순", time: "19:25" },
  { bus: "532", stop: "화순", time: "22:15" }
];

// 🔎 검색 함수
function findBus() {
    const input = document.getElementById("search").value.trim();
    const now = new Date();
    const currentMinutes = now.getHours() * 60 + now.getMinutes();

    let results = [];

    for (let i = 0; i < busData.length; i++) {
        if (busData[i].stop.includes(input)) {
            const [h, m] = busData[i].time.split(":");
            const busMinutes = parseInt(h) * 60 + parseInt(m);

            if (busMinutes >= currentMinutes) {
                results.push({
                    bus: busData[i].bus,
                    time: busData[i].time,
                    diff: busMinutes - currentMinutes
                });
            }
        }
    }

    if (results.length === 0) {
        document.getElementById("result").innerText = "남은 버스 없음";
        return;
    }

    results.sort((a, b) => a.diff - b.diff);

    const next = results[0];

    document.getElementById("result").innerText =
        `다음 버스 (${next.bus}번): ${next.time} (${next.diff}분 남음)`;
}
</script>

</body>
</html>
